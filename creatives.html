<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Drafts</title>
  <link rel="stylesheet" href="shared.css?v=2.3">
</head>
<body>

  <!-- Sticky top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="brief.html" class="back-link">← Brief</a>
      <span class="topbar-title">Creative Drafts</span>
    </div>
    <div class="topbar-actions brief-actions">
      <button class="btn btn-sm btn-draft-all" id="draft-all-btn">✦ Draft All</button>
      <button class="btn btn-sm btn-gdocs" id="gdocs-btn">Open in Google Docs</button>
      <button class="btn btn-sm btn-danger" id="clear-btn">Clear Drafts</button>
    </div>
  </div>

  <div id="creatives-root"></div>

<script src="wizard.js?v=2.3"></script>
<script>

  const s1 = Store.load('stage1');
  const s2 = Store.load('stage2');
  const s3 = Store.load('stage3');
  const s4 = Store.load('stage4');

  const selectedAssets = (s2.assets && s2.assets.length)
    ? ASSET_DEFS.filter(d => s2.assets.includes(d.key))
    : ASSET_DEFS;

  let _drafts = CreativeDrafts.load();

  // ── Build inner HTML for a done card (body + actions + refine panel) ──
  function buildDoneCardInner(def, draft) {
    const key = def.key;
    const ck  = key.replace(/[^a-z0-9]/gi,'_');

    const bodyHtml = draft.editedText
      ? `<div class="creative-card-body">
           <div class="draft-edited-notice">✏ Edited —
             <button class="btn-link" data-revert="${escHtml(key)}">Revert to AI draft</button>
           </div>
           <div class="draft-section">
             <div class="draft-section-content draft-copy" style="white-space:pre-wrap">${escHtml(draft.editedText)}</div>
           </div>
         </div>`
      : `<div class="creative-card-body">${renderDraftBody(key, draft.data)}</div>`;

    return `${bodyHtml}
      <div class="creative-card-actions">
        <button class="btn btn-sm btn-ghost" data-edit="${escHtml(key)}">✏ Edit</button>
        <button class="btn btn-sm btn-ghost" data-redraft="${escHtml(key)}">✦ Re-draft</button>
        <button class="btn btn-sm btn-ghost" data-refine-toggle="${escHtml(key)}">✦ Refine ↓</button>
      </div>
      <div class="refine-panel" id="refine-${ck}">
        <textarea class="refine-input" rows="3"
          placeholder="Describe what to change — e.g. 'make the tone more playful', 'add urgency to the CTA', 'write a 5th re-engagement email'…"></textarea>
        <div class="refine-row">
          <span class="refine-error" id="refine-err-${ck}"></span>
          <button class="btn btn-sm btn-ghost" data-refine-cancel="${escHtml(key)}">Cancel</button>
          <button class="btn btn-sm btn-draft-all" data-refine-apply="${escHtml(key)}">✦ Apply</button>
        </div>
      </div>`;
  }

  // ── Wire all listeners for a done card ──
  function wireCard(key) {
    const ck   = key.replace(/[^a-z0-9]/gi,'_');
    const card = document.getElementById('card-' + ck);
    if (!card) return;
    card.querySelector(`[data-edit="${key}"]`)         ?.addEventListener('click', () => enterEditMode(key));
    card.querySelector(`[data-redraft="${key}"]`)      ?.addEventListener('click', () => draftOne(key));
    card.querySelector(`[data-refine-toggle="${key}"]`)?.addEventListener('click', () => toggleRefine(key));
    card.querySelector(`[data-refine-cancel="${key}"]`)?.addEventListener('click', () => toggleRefine(key, false));
    card.querySelector(`[data-refine-apply="${key}"]`) ?.addEventListener('click', () => applyRefine(key));
    card.querySelector(`[data-revert="${key}"]`)       ?.addEventListener('click', () => revertEdits(key));
  }

  // ── Replace everything after .creative-card-header ──
  function rebuildCardBody(key, result) {
    const ck   = key.replace(/[^a-z0-9]/gi,'_');
    const card = document.getElementById('card-' + ck);
    if (!card) return;
    const header = card.querySelector('.creative-card-header');
    while (header.nextSibling) card.removeChild(header.nextSibling);

    let badge = header.querySelector('.creative-card-badge');

    if (result.status === 'done') {
      if (!badge) {
        badge = document.createElement('span');
        badge.className = 'creative-card-badge done';
        header.appendChild(badge);
      }
      badge.className = 'creative-card-badge done';
      badge.textContent = '✓ Drafted';
      const def = ASSET_DEFS.find(d => d.key === key);
      card.insertAdjacentHTML('beforeend', buildDoneCardInner(def, result));
      wireCard(key);
    } else {
      if (badge) badge.remove();
      const errMsg = escHtml(result.error || 'Unknown error');
      card.insertAdjacentHTML('beforeend', `
        <div class="creative-card-body draft-error">Error: ${errMsg} — try again.</div>
        <div class="creative-card-actions">
          <button class="btn btn-sm btn-ghost" data-draft="${escHtml(key)}">✦ Retry</button>
        </div>`);
      card.querySelector('[data-draft]')?.addEventListener('click', () => draftOne(key));
    }
  }

  // ── Loading state (while API call in flight) ──
  function setCardLoading(key) {
    const card = document.getElementById('card-' + key.replace(/[^a-z0-9]/gi,'_'));
    if (!card) return;
    const body = card.querySelector('.creative-card-body');
    if (body) { body.className = 'creative-card-body draft-loading'; body.innerHTML = '<div class="draft-spinner"></div> Drafting…'; }
    const badge = card.querySelector('.creative-card-badge');
    if (badge) badge.remove();
    const btn = card.querySelector('[data-draft],[data-redraft]');
    if (btn) { btn.disabled = true; btn.textContent = 'Drafting…'; }
  }

  // ── Draft a single asset ──
  async function draftOne(key) {
    if (!ApiKey.has()) { showToast('No API key — click ⚙ to add your Anthropic key.'); return; }
    setCardLoading(key);
    const ctx = _buildCreativesCtx(s1, s2, s3, s4);
    try {
      _drafts[key] = { status: 'done', data: await draftAsset(key, ctx) };
    } catch(e) {
      _drafts[key] = { status: 'error', error: e.message === 'NO_API_KEY' ? 'No API key set.' : e.message };
    }
    CreativeDrafts.save(_drafts);
    rebuildCardBody(key, _drafts[key]);
  }

  // ── Edit mode ──
  function enterEditMode(key) {
    const ck   = key.replace(/[^a-z0-9]/gi,'_');
    const card = document.getElementById('card-' + ck);
    const body    = card?.querySelector('.creative-card-body');
    const actions = card?.querySelector('.creative-card-actions');
    const refinePanel = document.getElementById('refine-' + ck);
    if (!body || !actions) return;

    // Close refine panel if open
    if (refinePanel) refinePanel.classList.remove('open');

    // Extract current displayed text from rendered sections
    const draft = _drafts[key];
    let editText = draft?.editedText || '';
    if (!editText && draft?.status === 'done') {
      const sections = body.querySelectorAll('.draft-section');
      editText = sections.length
        ? Array.from(sections).map(sec => {
            const lbl = sec.querySelector('.draft-section-label')?.textContent?.trim() || '';
            const val = sec.querySelector('.draft-section-content')?.textContent?.trim() || '';
            return lbl ? `${lbl}:\n${val}` : val;
          }).filter(Boolean).join('\n\n')
        : body.textContent.trim();
    }

    body.innerHTML = `<textarea class="draft-edit-textarea" id="edit-ta-${ck}"></textarea>`;
    document.getElementById('edit-ta-' + ck).value = editText;

    actions.innerHTML = `
      <span class="edit-hint">Editing — save to keep your changes</span>
      <button class="btn btn-sm btn-ghost" data-cancel-edit="${escHtml(key)}">Cancel</button>
      <button class="btn btn-sm btn-primary" data-save-edit="${escHtml(key)}">Save</button>`;

    document.getElementById('edit-ta-' + ck)?.focus();
    actions.querySelector('[data-cancel-edit]')?.addEventListener('click', () => exitEditMode(key, false));
    actions.querySelector('[data-save-edit]')  ?.addEventListener('click', () => exitEditMode(key, true));
  }

  function exitEditMode(key, save) {
    const ck = key.replace(/[^a-z0-9]/gi,'_');
    const ta = document.getElementById('edit-ta-' + ck);
    if (save && ta) {
      const txt = ta.value.trim();
      if (txt) _drafts[key].editedText = txt;
      else     delete _drafts[key].editedText;
      CreativeDrafts.save(_drafts);
    }
    rebuildCardBody(key, _drafts[key]);
  }

  // ── Refine panel ──
  function toggleRefine(key, forceOpen) {
    const ck     = key.replace(/[^a-z0-9]/gi,'_');
    const panel  = document.getElementById('refine-' + ck);
    const card   = document.getElementById('card-' + ck);
    if (!panel) return;
    const open = forceOpen !== undefined ? forceOpen : !panel.classList.contains('open');
    panel.classList.toggle('open', open);
    const btn = card?.querySelector('[data-refine-toggle]');
    if (btn) btn.textContent = open ? '✦ Refine ↑' : '✦ Refine ↓';
    if (open) panel.querySelector('.refine-input')?.focus();
  }

  async function applyRefine(key) {
    if (!ApiKey.has()) { showToast('No API key — click ⚙ to add your Anthropic key.'); return; }
    const ck       = key.replace(/[^a-z0-9]/gi,'_');
    const panel    = document.getElementById('refine-' + ck);
    const textarea = panel?.querySelector('.refine-input');
    const errorEl  = document.getElementById('refine-err-' + ck);
    const applyBtn = panel?.querySelector('[data-refine-apply]');
    const instruction = textarea?.value?.trim();
    if (!instruction) return;
    const draft = _drafts[key];
    if (!draft?.data) return;

    applyBtn.disabled = true;
    applyBtn.textContent = '✦ Applying…';
    if (errorEl) errorEl.textContent = '';

    try {
      const ctx     = _buildCreativesCtx(s1, s2, s3, s4);
      const updated = await refineAsset(key, draft.data, draft.editedText, instruction, ctx);
      _drafts[key]  = { status: 'done', data: updated };
      CreativeDrafts.save(_drafts);
      textarea.value = '';
      rebuildCardBody(key, _drafts[key]);
    } catch(e) {
      if (errorEl) errorEl.textContent = e.message === 'NO_API_KEY' ? 'No API key set.' : 'Refine failed — try again.';
      if (applyBtn) { applyBtn.disabled = false; applyBtn.textContent = '✦ Apply'; }
    }
  }

  function revertEdits(key) {
    if (_drafts[key]) { delete _drafts[key].editedText; CreativeDrafts.save(_drafts); }
    rebuildCardBody(key, _drafts[key]);
  }

  // ── Render all cards ──
  function renderCreatives() {
    const root = document.getElementById('creatives-root');
    const hasData = Object.keys(s1).length + Object.keys(s2).length > 0;

    if (!hasData) {
      root.innerHTML = `<div class="creatives-wrap"><div class="creatives-empty empty-state">
        <div class="empty-icon">🎨</div>
        <div class="empty-title">No campaign data yet.</div>
        <div class="empty-desc">Complete at least Stage 1 &amp; 2 of the wizard first, then come back to draft your creative assets.</div>
        <a href="stage1.html" class="btn btn-primary" style="display:inline-flex;">Begin Stage 1 →</a>
      </div></div>`;
      return;
    }

    if (!selectedAssets.length) {
      root.innerHTML = `<div class="creatives-wrap">
        <div class="creatives-intro"><h2>Creative Drafts</h2>
          <p>No assets selected in Stage 2. <a href="stage2.html">Go to Stage 2</a> and select the assets you want to produce.</p>
        </div></div>`;
      return;
    }

    const cards = selectedAssets.map(def => {
      const key   = def.key;
      const ck    = key.replace(/[^a-z0-9]/gi,'_');
      const draft = _drafts[key];
      let badgeHtml = '', cardInnerHtml;

      if (draft?.status === 'done') {
        badgeHtml    = `<span class="creative-card-badge done">✓ Drafted</span>`;
        cardInnerHtml = buildDoneCardInner(def, draft);
      } else if (draft?.status === 'error') {
        badgeHtml    = `<span class="creative-card-badge" style="color:var(--c6);background:color-mix(in srgb,var(--c6) 15%,var(--surface2));">Error</span>`;
        cardInnerHtml = `<div class="creative-card-body draft-error">Error: ${escHtml(draft.error||'Unknown error')} — try again.</div>
          <div class="creative-card-actions"><button class="btn btn-sm btn-ghost" data-draft="${escHtml(key)}">✦ Retry</button></div>`;
      } else {
        cardInnerHtml = `<div class="creative-card-body draft-empty">No draft yet — click Draft to generate with AI.</div>
          <div class="creative-card-actions"><button class="btn btn-sm btn-draft-all" data-draft="${escHtml(key)}">✦ Draft</button></div>`;
      }

      return `<div class="creative-card" id="card-${ck}">
        <div class="creative-card-header" style="--accent-color:${def.color}">
          <div class="creative-card-icon" style="background:color-mix(in srgb,${def.color} 18%,var(--surface2));color:${def.color}">${def.icon}</div>
          <div class="creative-card-title">${escHtml(key)}</div>
          ${badgeHtml}
        </div>
        ${cardInnerHtml}
      </div>`;
    }).join('');

    root.innerHTML = `<div class="creatives-wrap">
      <div class="creatives-intro">
        <h2>${escHtml(s1.campaign_name || 'Your Campaign')} — Creative Drafts</h2>
        <p>AI-generated copy and visual direction for each asset. Draft individually or use <strong>Draft All</strong> to generate in parallel. Drafts are saved in your browser — edit or refine them with AI at any time.</p>
      </div>
      <div class="creatives-grid">${cards}</div>
    </div>`;

    // Wire listeners
    selectedAssets.forEach(def => {
      const draft = _drafts[def.key];
      if (draft?.status === 'done') {
        wireCard(def.key);
      } else {
        const card = document.getElementById('card-' + def.key.replace(/[^a-z0-9]/gi,'_'));
        card?.querySelector('[data-draft]')?.addEventListener('click', () => draftOne(def.key));
      }
    });
  }

  // ── Draft All ──
  document.getElementById('draft-all-btn').addEventListener('click', async () => {
    if (!ApiKey.has()) { showToast('No API key — click ⚙ to add your Anthropic key.'); return; }
    const btn = document.getElementById('draft-all-btn');
    btn.disabled = true; btn.textContent = '✦ Drafting…';
    const ctx  = _buildCreativesCtx(s1, s2, s3, s4);
    const keys = selectedAssets.map(d => d.key);
    keys.forEach(key => { if (_drafts[key]?.status !== 'done') setCardLoading(key); });
    await Promise.all(keys.map(async key => {
      if (_drafts[key]?.status === 'done') return;
      try {
        _drafts[key] = { status: 'done', data: await draftAsset(key, ctx) };
      } catch(e) {
        _drafts[key] = { status: 'error', error: e.message === 'NO_API_KEY' ? 'No API key set.' : e.message };
      }
      CreativeDrafts.save(_drafts);
      rebuildCardBody(key, _drafts[key]);
    }));
    btn.disabled = false; btn.textContent = '✦ Draft All';
    showToast('All drafts complete!');
  });

  // ── Google Docs export ──
  document.getElementById('gdocs-btn').addEventListener('click', async () => {
    if (!Object.values(_drafts).some(d => d.status === 'done')) {
      showToast('No drafts yet — generate some drafts first.'); return;
    }
    const btn = document.getElementById('gdocs-btn');
    const orig = btn.textContent;
    btn.disabled = true; btn.textContent = 'Opening…';
    try {
      await openCreativesInGoogleDocs(s1, _drafts);
    } catch(e) {
      showToast(e.message.includes('not initialised')
        ? 'Google auth loading — wait a moment and try again.'
        : 'Could not open Google — check that pop-ups are allowed and try again.');
    } finally { btn.disabled = false; btn.textContent = orig; }
  });

  // ── Clear drafts ──
  document.getElementById('clear-btn').addEventListener('click', () => {
    if (!confirm('Clear all creative drafts? This cannot be undone.')) return;
    CreativeDrafts.clear(); _drafts = {}; renderCreatives();
  });

  renderCreatives();

</script>
<script src="https://accounts.google.com/gsi/client" async onload="initGoogleAuth()"></script>
</body>
</html>
